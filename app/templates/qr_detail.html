<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACKFLOW Approver QR</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8 col-xl-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-md-5 text-center">
                        <p class="text-uppercase text-secondary small mb-2">TRACKFLOW</p>
                        <h1 class="h3 mb-2">Permanent Approver QR</h1>
                        <p class="text-secondary mb-4">
                            This QR remains fixed and can be reused for new document submissions.
                        </p>

                        <div class="mb-3">
                            <div class="text-secondary small">Approver</div>
                            <div class="fw-semibold fs-5">{{ approver.approval_name }}</div>
                        </div>

                        <div class="mb-3">
                            <span class="badge text-bg-primary">{{ qr_status }}</span>
                        </div>

                        <div class="border rounded-4 bg-white p-4 mb-4">
                            <img
                                src="{{ qr_image_url }}"
                                alt="QR code for {{ approver.approval_name }}"
                                class="img-fluid"
                                style="max-width: 320px;"
                            >
                        </div>

                        <div class="text-secondary small mb-2">QR Target URL</div>
                        <div class="small text-break mb-4">{{ target_url }}</div>

                        <div class="d-flex justify-content-center gap-2">
                            <a href="{{ qr_image_url }}" target="_blank" class="btn btn-outline-primary">Open QR Image</a>
                            <a href="/submit/{{ approver.slug }}" target="_blank" class="btn btn-primary">Open Submission Page</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
